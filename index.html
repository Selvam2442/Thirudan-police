<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thirudan Police Pro</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @keyframes wiggle {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        .animate-wiggle {
            animation: wiggle 1s ease-in-out infinite;
        }
        @keyframes customBounce {
            0%, 100% { transform: translateY(-10%); animation-timing-function: cubic-bezier(0.8,0,1,1); }
            50% { transform: none; animation-timing-function: cubic-bezier(0,0,0.2,1); }
        }
        .animate-custom-bounce {
            animation: customBounce 1s infinite;
        }
        @keyframes pulse-fast {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .animate-pulse-fast {
            animation: pulse-fast 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Base styles optimized for mobile */
        body {
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            background-color: #020617; /* slate-950 */
            color: white;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden; /* Prevent horizontal scroll, allow vertical */
        }

        /* Inputs should allow text selection */
        input {
            user-select: text;
            -webkit-user-select: text;
        }

        /* Beautiful thin scrollbars */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.5); /* Blue-500 with opacity */
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.8);
        }

        /* Mobile specific adjustments */
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center selection:bg-blue-500/30">

    <!-- Background decoration -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-20%] w-[90vw] h-[90vw] rounded-full bg-blue-900/15 blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-20%] w-[90vw] h-[90vw] rounded-full bg-purple-900/15 blur-[120px]"></div>
    </div>

    <!-- Top Bar -->
    <div id="top-bar" class="fixed top-0 left-0 right-0 p-4 flex justify-between items-center z-30 max-w-md mx-auto w-full hidden animate-[fade-in_0.5s_ease-out]">
        <div class="glass-panel px-4 py-2 rounded-full flex items-center gap-2 shadow-lg border-slate-700/50">
            <i class="fa-solid fa-trophy text-yellow-500 text-sm"></i>
            <span id="round-indicator" class="text-white font-black text-sm tracking-widest">R 1/5</span>
        </div>
        
        <button onclick="exitGame()" class="bg-slate-900/80 hover:bg-red-900/50 text-red-400 p-3 rounded-full border border-slate-700 hover:border-red-500/50 transition-all active:scale-90 shadow-lg backdrop-blur-md" title="Exit Game">
            <i class="fa-solid fa-power-off"></i>
        </button>
    </div>

    <!-- Main Content Area (Added padding bottom for watermark) -->
    <div id="app" class="relative z-10 w-full max-w-md mx-auto flex flex-col justify-center items-center min-h-screen px-4 pb-24 pt-16">
        <!-- Rendered by JS -->
    </div>

    <!-- Persistent Watermark -->
    <div class="fixed bottom-0 left-0 w-full p-4 z-20 pointer-events-none flex flex-col items-center justify-end bg-gradient-to-t from-slate-950 via-slate-950/80 to-transparent h-24">
        <div class="text-center opacity-60">
            <p class="text-[10px] text-slate-400 font-medium tracking-widest uppercase mb-1">Created By</p>
            <p class="text-xs font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400 drop-shadow-[0_0_8px_rgba(59,130,246,0.5)]">Maria Antony Selvam S</p>
            <div class="flex items-center justify-center gap-1 mt-1">
                <i class="fa-brands fa-instagram text-[#E1306C] text-[10px]"></i>
                <p class="text-[10px] text-slate-300 font-bold tracking-wide">@alan_editxz</p>
            </div>
        </div>
    </div>

    <script>
        // --- SYNTHESIZED SOUND ENGINE ---
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } 
            else if (type === 'beep') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, now); // A4
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } 
            else if (type === 'go') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, now); // A5 (High pitch)
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            }
            else if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(659.25, now); // E5
                osc.frequency.setValueAtTime(880, now + 0.1); // A5
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            }
            else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            }
            else if (type === 'win') {
                // Retro Arpeggio (Level Up Sound)
                osc.type = 'square';
                gain.gain.setValueAtTime(0.1, now);
                
                osc.frequency.setValueAtTime(440, now); // A4
                osc.frequency.setValueAtTime(554.37, now + 0.1); // C#5
                osc.frequency.setValueAtTime(659.25, now + 0.2); // E5
                osc.frequency.setValueAtTime(880, now + 0.3); // A5
                
                gain.gain.linearRampToValueAtTime(0.1, now + 0.6);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1.2);
                
                osc.start(now);
                osc.stop(now + 1.2);
            }
        }

        // --- GAME CONSTANTS ---
        const ROLES = {
            RAJA: { id: 'raja', name: 'Raja', points: 1000, icon: 'fa-solid fa-crown', color: 'text-yellow-400', glow: 'shadow-yellow-500/50', border: 'border-yellow-500/30' },
            MANTRI: { id: 'mantri', name: 'Mantri', points: 800, icon: 'fa-solid fa-briefcase', color: 'text-purple-400', glow: 'shadow-purple-500/50', border: 'border-purple-500/30' },
            POLICE: { id: 'police', name: 'Police', points: 500, icon: 'fa-solid fa-shield-halved', color: 'text-blue-500', glow: 'shadow-blue-500/50', border: 'border-blue-500/30' },
            THIRUDAN: { id: 'thirudan', name: 'Thirudan', points: 0, icon: 'fa-solid fa-user-secret', color: 'text-red-500', glow: 'shadow-red-500/50', border: 'border-red-500/30' },
            PAALKARAN: { id: 'paalkaran', name: 'Paalkaran', points: 300, icon: 'fa-solid fa-mug-hot', color: 'text-gray-300', glow: 'shadow-gray-500/50', border: 'border-gray-500/30' },
            PANIPOORI: { id: 'panipoori', name: 'Pani Poori Kaaran', points: 200, icon: 'fa-solid fa-utensils', color: 'text-orange-400', glow: 'shadow-orange-500/50', border: 'border-orange-500/30' }
        };

        // --- STATE MANAGEMENT ---
        const state = {
            gameState: 'LANDING', // LANDING, SETUP, PASS, COUNTDOWN, REVEAL, GUESS, ROUND_END, GAME_OVER
            playerCount: 4,
            totalRounds: 5,
            currentRound: 1,
            players: [],
            playerNames: ['Player 1', 'Player 2', 'Player 3', 'Player 4'],
            assignedRoles: {},
            currentPlayerIndex: 0,
            countdown: 3,
            guessResult: null,
            timerInterval: null
        };

        // --- FULLSCREEN LOGIC ---
        window.enterFullscreenAndStart = async function() {
            playSound('click');
            try {
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) { /* Safari */
                    await document.documentElement.webkitRequestFullscreen();
                } else if (document.documentElement.msRequestFullscreen) { /* IE11 */
                    await document.documentElement.msRequestFullscreen();
                }
            } catch (err) {
                console.warn("Fullscreen API not supported or blocked, continuing game.", err);
            }
            state.gameState = 'SETUP';
            render();
        };

        window.exitGame = async function() {
            playSound('click');
            try {
                if (document.exitFullscreen && document.fullscreenElement) {
                    await document.exitFullscreen();
                } else if (document.webkitExitFullscreen && document.webkitFullscreenElement) {
                    await document.webkitExitFullscreen();
                }
            } catch(err) {}
            
            if(state.timerInterval) clearInterval(state.timerInterval);
            state.gameState = 'LANDING';
            state.players = [];
            state.currentRound = 1;
            render();
        };

        // --- GAME HANDLERS ---
        window.setPlayerCount = function(count) {
            playSound('click');
            state.playerCount = count;
            const newNames = Array(count).fill('').map((_, i) => state.playerNames[i] || `Player ${i + 1}`);
            state.playerNames = newNames;
            render();
        };

        window.updateName = function(index, name) {
            state.playerNames[index] = name;
        };

        window.setTotalRounds = function(num) {
            playSound('click');
            state.totalRounds = num;
            render();
        };

        window.startGame = function() {
            playSound('click');
            const initialPlayers = state.playerNames.map((name, index) => ({
                id: `p${index}`,
                name: name.trim() || `Player ${index + 1}`,
                score: 0
            }));
            state.players = initialPlayers;
            state.currentRound = 1;
            startNewRound(initialPlayers);
        };

        function startNewRound(currentPlayersList = state.players) {
            const rolesToAssign = [ROLES.RAJA, ROLES.MANTRI, ROLES.POLICE, ROLES.THIRUDAN];
            if (state.playerCount >= 5) rolesToAssign.push(ROLES.PAALKARAN);
            if (state.playerCount >= 6) rolesToAssign.push(ROLES.PANIPOORI);

            const shuffledRoles = [...rolesToAssign].sort(() => Math.random() - 0.5);
            const newAssignedRoles = {};
            
            currentPlayersList.forEach((player, index) => {
                newAssignedRoles[player.id] = shuffledRoles[index];
            });

            state.assignedRoles = newAssignedRoles;
            state.currentPlayerIndex = 0;
            state.guessResult = null;
            state.gameState = 'PASS';
            window.scrollTo(0, 0); 
            render();
        }

        window.startCountdown = function() {
            playSound('beep'); // Initial beep for 3
            state.gameState = 'COUNTDOWN';
            state.countdown = 3;
            render();
            
            if(state.timerInterval) clearInterval(state.timerInterval);
            
            state.timerInterval = setInterval(() => {
                state.countdown--;
                if (state.countdown > 0) {
                    playSound('beep');
                    render();
                } else if (state.countdown === 0) {
                    playSound('go');
                    render(); // Render GO!
                    clearInterval(state.timerInterval);
                    setTimeout(() => {
                        state.gameState = 'REVEAL';
                        render();
                    }, 800); // Wait slightly on GO before revealing
                }
            }, 1000);
        };

        window.handleNextPlayerPhase = function() {
            playSound('click');
            if (state.currentPlayerIndex < state.playerCount - 1) {
                state.currentPlayerIndex++;
                state.gameState = 'PASS';
            } else {
                state.gameState = 'GUESS';
            }
            window.scrollTo(0, 0);
            render();
        };

        window.handlePoliceGuess = function(suspectId) {
            if(state.guessResult) return; 

            const thirudanId = Object.keys(state.assignedRoles).find(id => state.assignedRoles[id].id === 'thirudan');
            const isCorrect = suspectId === thirudanId;
            
            if (isCorrect) {
                playSound('correct');
            } else {
                playSound('wrong');
            }

            state.guessResult = { correct: isCorrect, thirudanId };

            const updatedPlayers = state.players.map(player => {
                const role = state.assignedRoles[player.id];
                let pointsToAdd = role.points;

                if (role.id === 'police') {
                    pointsToAdd = isCorrect ? 500 : 0;
                } else if (role.id === 'thirudan') {
                    pointsToAdd = isCorrect ? 0 : 500;
                }

                return { ...player, score: player.score + pointsToAdd };
            });

            state.players = updatedPlayers;
            render();

            setTimeout(() => {
                state.gameState = 'ROUND_END';
                window.scrollTo(0, 0);
                render();
            }, 4000);
        };

        window.handleNextRound = function() {
            if (state.currentRound < state.totalRounds) {
                playSound('click');
                state.currentRound++;
                startNewRound();
            } else {
                playSound('win');
                state.gameState = 'GAME_OVER';
                window.scrollTo(0, 0);
                render();
            }
        };

        window.resetGame = function() {
            playSound('click');
            if(state.timerInterval) clearInterval(state.timerInterval);
            state.gameState = 'SETUP';
            state.currentRound = 1;
            window.scrollTo(0, 0);
            render();
        };

        // --- RENDER FUNCTIONS ---
        function renderLanding() {
            return `
            <div class="glass-panel flex flex-col items-center justify-center w-full p-8 sm:p-10 rounded-[2.5rem] text-center transition-all duration-500 animate-[fade-in_0.6s_ease-out]">
                <div class="relative mb-8 group">
                    <div class="absolute -inset-4 bg-gradient-to-r from-blue-600 to-purple-600 rounded-full blur-xl opacity-50 animate-pulse-fast"></div>
                    <div class="relative bg-slate-900 w-24 h-24 flex items-center justify-center rounded-full border border-slate-700 shadow-inner">
                        <i class="fa-solid fa-shield-halved text-5xl text-blue-400 drop-shadow-[0_0_10px_rgba(96,165,250,0.8)]"></i>
                    </div>
                </div>
                
                <h1 class="text-4xl sm:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-br from-blue-400 via-purple-400 to-red-400 tracking-tighter mb-3 drop-shadow-lg leading-tight">
                    THIRUDAN<br/>POLICE
                </h1>
                
                <p class="text-slate-400 mb-8 text-sm sm:text-base font-bold tracking-wider uppercase">90s Kids Vibe Edition</p>

                <div class="bg-red-500/10 border border-red-500/30 rounded-2xl p-4 mb-8 flex items-start gap-3 text-left w-full">
                    <i class="fa-solid fa-expand text-red-400 text-lg mt-0.5 shrink-0"></i>
                    <p class="text-red-300 text-xs sm:text-sm font-semibold leading-relaxed">
                        Macha, intha game ah full screen la aadina than kick! Alert aagu!
                    </p>
                </div>

                <button onclick="enterFullscreenAndStart()" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white rounded-2xl font-black text-lg sm:text-xl flex items-center justify-center gap-3 shadow-[0_0_25px_rgba(79,70,229,0.4)] transition-all active:scale-95">
                    <i class="fa-solid fa-play"></i> ULLE VAA!
                </button>
            </div>`;
        }

        function renderSetup() {
            const counts = [4, 5, 6];
            const countButtons = counts.map(num => `
                <button onclick="setPlayerCount(${num})" class="flex-1 py-3 rounded-xl font-bold text-base transition-all ${state.playerCount === num ? 'bg-blue-600 text-white shadow-[0_0_15px_rgba(37,99,235,0.6)] border border-blue-400' : 'bg-slate-800/80 text-slate-400 border border-slate-700 active:bg-slate-700'}">
                    ${num}
                </button>
            `).join('');

            const nameInputs = state.playerNames.map((name, idx) => `
                <div class="flex items-center bg-slate-900/80 rounded-xl px-4 border border-slate-700 focus-within:border-blue-500 focus-within:shadow-[0_0_10px_rgba(37,99,235,0.3)] transition-all">
                    <i class="fa-solid fa-user text-slate-500 text-sm mr-3"></i>
                    <input type="text" value="${name}" oninput="updateName(${idx}, this.value)" placeholder="Player ${idx + 1}" class="w-full py-3.5 bg-transparent text-white font-bold text-[16px] outline-none placeholder-slate-600" />
                </div>
            `).join('');

            const rounds = [5, 10, 20];
            const roundButtons = rounds.map(num => `
                <button onclick="setTotalRounds(${num})" class="flex-1 py-3 rounded-xl font-bold text-base transition-all ${state.totalRounds === num ? 'bg-purple-600 text-white shadow-[0_0_15px_rgba(147,51,234,0.6)] border border-purple-400' : 'bg-slate-800/80 text-slate-400 border border-slate-700 active:bg-slate-700'}">
                    ${num}
                </button>
            `).join('');

            return `
            <div class="glass-panel flex flex-col items-center w-full p-6 sm:p-8 rounded-[2.5rem] w-full animate-[fade-in_0.4s_ease-out]">
                <div class="flex items-center justify-center gap-3 mb-6 w-full bg-slate-900/50 py-3 rounded-2xl border border-slate-800">
                    <i class="fa-solid fa-users-gear text-xl text-blue-500"></i>
                    <h2 class="text-xl font-black text-white tracking-widest uppercase">Match Setup</h2>
                </div>

                <div class="w-full max-h-[50vh] overflow-y-auto pr-1 space-y-6 pb-2">
                    <div class="w-full bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                        <label class="block text-blue-300 text-xs font-black mb-3 uppercase tracking-wider pl-1">Ethana peru aada poringa?</label>
                        <div class="flex justify-between gap-2">${countButtons}</div>
                    </div>

                    <div class="w-full bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                        <label class="block text-blue-300 text-xs font-black mb-3 uppercase tracking-wider pl-1">Players Name</label>
                        <div class="space-y-2.5">${nameInputs}</div>
                    </div>

                    <div class="w-full bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                        <label class="block text-purple-300 text-xs font-black mb-3 uppercase tracking-wider pl-1">Ethana Rounds?</label>
                        <div class="flex justify-between gap-2">${roundButtons}</div>
                    </div>
                </div>

                <button onclick="startGame()" class="w-full mt-6 py-4 bg-gradient-to-r from-green-500 to-emerald-600 text-white rounded-2xl font-black text-lg flex items-center justify-center gap-2 shadow-[0_0_25px_rgba(16,185,129,0.4)] transition-all active:scale-95">
                    <i class="fa-solid fa-play"></i> GAME START
                </button>
            </div>`;
        }

        function renderPassPhone() {
            const currentPlayer = state.players[state.currentPlayerIndex];
            return `
            <div class="glass-panel flex flex-col items-center justify-center w-full p-8 sm:p-10 rounded-[2.5rem] text-center relative overflow-hidden transition-all duration-300">
                <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-transparent via-blue-500 to-transparent opacity-50"></div>
                
                <div class="relative mb-8 mt-4">
                    <div class="absolute inset-0 bg-blue-500 rounded-full blur-2xl opacity-20 animate-pulse-fast"></div>
                    <div class="w-24 h-24 sm:w-28 sm:h-28 bg-slate-900 rounded-full border border-blue-500/50 flex items-center justify-center relative z-10 shadow-inner">
                        <i class="fa-solid fa-mobile-screen-button text-4xl sm:text-5xl text-blue-400 animate-[customBounce_2s_infinite]"></i>
                    </div>
                </div>
                
                <div class="inline-block px-4 py-1.5 rounded-full bg-blue-500/10 border border-blue-500/30 text-blue-300 font-black text-xs sm:text-sm mb-6 uppercase tracking-widest shadow-[0_0_15px_rgba(59,130,246,0.2)]">
                    Round ${state.currentRound} / ${state.totalRounds}
                </div>
                
                <h1 class="text-3xl sm:text-4xl font-black text-white mb-4 tracking-wide leading-tight">
                    Dei <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 drop-shadow-md">${currentPlayer.name}</span>,<br/> Phone ah vaangu!
                </h1>
                
                <div class="bg-slate-900/80 p-4 rounded-2xl border border-slate-700 mb-8 w-full shadow-inner">
                    <p class="text-slate-300 font-semibold text-sm leading-relaxed">Sathiyama sollren, pakkathula irukavan paaka koodathu!</p>
                </div>
                
                <button onclick="startCountdown()" class="w-full py-4 sm:py-5 bg-blue-600 text-white rounded-2xl font-black text-lg flex items-center justify-center gap-3 shadow-[0_0_25px_rgba(37,99,235,0.5)] transition-all active:scale-95">
                    <i class="fa-solid fa-eye-slash"></i> Phone Enkitta Iruku!
                </button>
            </div>`;
        }

        function renderCountdown() {
            return `
            <div class="glass-panel flex flex-col items-center justify-center w-full py-16 px-8 rounded-[2.5rem] text-center relative overflow-hidden border-red-500/30 shadow-[0_0_50px_rgba(239,68,68,0.2)]">
                <div class="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-red-600 via-transparent to-transparent animate-pulse-fast"></div>
                
                <i class="fa-solid fa-triangle-exclamation text-6xl sm:text-7xl text-red-500 mb-6 animate-custom-bounce drop-shadow-[0_0_15px_rgba(239,68,68,0.8)]"></i>
                
                <h2 class="text-2xl sm:text-3xl text-red-400 font-black mb-4 animate-pulse-fast uppercase tracking-widest">Maraichiko!</h2>
                <p class="text-red-300/80 font-bold text-sm sm:text-base mb-8">Pakkathula yaru paakuranga nu check pannu!</p>
                
                <div class="text-[8rem] sm:text-[10rem] leading-none font-black text-white drop-shadow-[0_0_40px_rgba(255,255,255,0.8)] transform scale-125 transition-transform duration-200">
                    ${state.countdown > 0 ? state.countdown : 'GO!'}
                </div>
            </div>`;
        }

        function renderReveal() {
            const currentPlayer = state.players[state.currentPlayerIndex];
            const currentRole = state.assignedRoles[currentPlayer.id];
            
            let extraDialog = '';
            if (currentRole.id === 'police') {
                extraDialog = `
                <div class="bg-blue-500/10 border border-blue-500/50 p-4 rounded-2xl mb-8 z-10 animate-pulse-fast w-full">
                    <p class="text-blue-300 font-bold text-sm sm:text-base">Mass kaatu! Gammunu irunthu Thirudan yaru nu kandupidi!</p>
                </div>`;
            } else if (currentRole.id === 'thirudan') {
                extraDialog = `
                <div class="bg-red-500/10 border border-red-500/50 p-4 rounded-2xl mb-8 z-10 animate-pulse-fast w-full">
                    <p class="text-red-300 font-bold text-sm sm:text-base">Maatikatha da! Nallavan mathiri nadi!</p>
                </div>`;
            }

            const gradientClass = currentRole.color.replace('text-', 'from-');

            return `
            <div class="glass-panel flex flex-col items-center justify-center w-full p-8 sm:p-10 rounded-[2.5rem] border ${currentRole.border} text-center relative overflow-hidden transition-all duration-500">
                <div class="absolute inset-0 opacity-15 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] ${gradientClass} via-transparent to-transparent animate-pulse-fast"></div>

                <div class="inline-block px-5 py-1.5 rounded-full bg-slate-900 border border-slate-700 text-slate-300 font-black text-xs sm:text-sm mb-8 uppercase tracking-widest relative z-10 shadow-lg">
                    Secret Role Reveal
                </div>
                
                <div class="relative w-32 h-32 sm:w-40 sm:h-40 rounded-full flex items-center justify-center bg-slate-950 shadow-inner mb-6 ${currentRole.color} ${currentRole.glow} shadow-[0_0_40px_currentColor] border border-slate-800 z-10 transform scale-100 transition-transform duration-500">
                    <i class="${currentRole.icon} text-6xl sm:text-[5rem]"></i>
                </div>
                
                <h1 class="text-4xl sm:text-5xl font-black mb-4 ${currentRole.color} drop-shadow-lg z-10 tracking-tight uppercase">
                    ${currentRole.name}
                </h1>
                
                <div class="bg-slate-900/80 px-6 py-2 rounded-full border border-slate-700 mb-8 z-10 shadow-inner">
                    <p class="text-white font-black text-lg">Points: <span class="${currentRole.color}">${currentRole.points}</span></p>
                </div>

                ${extraDialog}

                <button onclick="handleNextPlayerPhase()" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-black text-lg flex items-center justify-center gap-3 transition-all active:scale-95 border border-slate-600 z-10 shadow-lg">
                    Paathuten <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>`;
        }

        function renderPoliceGuess() {
            const policePlayerId = Object.keys(state.assignedRoles).find(id => state.assignedRoles[id]?.id === 'police');
            const policePlayer = state.players.find(p => p.id === policePlayerId);
            
            let contentHtml = '';

            if (state.guessResult) {
                const actualThirudan = state.players.find(p => p.id === state.guessResult.thirudanId);
                
                if (state.guessResult.correct) {
                    contentHtml = `
                    <div class="w-full p-6 sm:p-8 rounded-3xl text-center z-10 bg-gradient-to-b from-green-900/40 to-green-900/10 border-green-500 shadow-[0_0_30px_rgba(34,197,94,0.2)] border-2 backdrop-blur-md">
                        <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner">
                            <i class="fa-regular fa-circle-check text-5xl text-green-400 drop-shadow-[0_0_15px_rgba(34,197,94,0.8)]"></i>
                        </div>
                        <h2 class="text-2xl sm:text-3xl font-black text-green-400 mb-2 drop-shadow-md">Semma Mass!</h2>
                        <p class="text-slate-200 font-bold text-sm sm:text-base mb-4">Sariya Kandupudichita!</p>
                        <div class="bg-slate-950/80 rounded-xl p-3 sm:p-4 border border-green-500/30 flex flex-col gap-1">
                            <p class="text-green-400 font-black text-sm">Police: +500 Pts</p>
                            <p class="text-red-500 font-black text-sm">Thirudan: Out (0 Pts)</p>
                        </div>
                    </div>`;
                } else {
                    contentHtml = `
                    <div class="w-full p-6 sm:p-8 rounded-3xl text-center z-10 bg-gradient-to-b from-red-900/40 to-red-900/10 border-red-500 shadow-[0_0_30px_rgba(239,68,68,0.2)] border-2 backdrop-blur-md">
                        <div class="w-20 h-20 bg-red-500/20 rounded-full flex items-center justify-center mx-auto mb-5 animate-wiggle shadow-inner">
                            <i class="fa-regular fa-circle-xmark text-5xl text-red-500 drop-shadow-[0_0_15px_rgba(239,68,68,0.8)]"></i>
                        </div>
                        <h2 class="text-2xl sm:text-3xl font-black text-red-400 mb-2 drop-shadow-md">Aiyo Thappu Da!</h2>
                        <p class="text-slate-300 text-sm sm:text-base font-semibold mb-4 leading-relaxed">
                            Original Thirudan: <br/>
                            <span class="font-black text-xl sm:text-2xl text-white block mt-2 bg-slate-950/80 py-2 px-4 rounded-xl border border-red-500/50 shadow-inner">
                                ${actualThirudan.name}
                            </span>
                        </p>
                        <div class="bg-slate-950/80 rounded-xl p-3 sm:p-4 border border-red-500/30 flex flex-col gap-1">
                            <p class="text-red-400 font-black text-sm">Thirudan Escaped: +500 Pts</p>
                            <p class="text-slate-500 font-black text-sm">Police: 0 Pts</p>
                        </div>
                    </div>`;
                }
            } else {
                const buttons = state.players.filter(p => p.id !== policePlayerId).map(player => `
                    <button onclick="handlePoliceGuess('${player.id}')" class="relative flex flex-col items-center justify-center p-4 sm:p-6 bg-slate-800/80 hover:bg-slate-700 rounded-2xl border border-slate-600 transition-all active:scale-95 group overflow-hidden shadow-lg">
                        <div class="absolute inset-0 bg-red-500/0 group-active:bg-red-500/20 transition-colors duration-200"></div>
                        <div class="w-16 h-16 sm:w-20 sm:h-20 bg-slate-900 rounded-full flex items-center justify-center mb-3 sm:mb-4 border border-slate-700 group-active:border-red-500/50 transition-colors shadow-inner relative z-10">
                            <i class="fa-solid fa-user text-3xl sm:text-4xl text-slate-500 group-active:text-red-400 transition-colors"></i>
                        </div>
                        <span class="font-black text-white text-base sm:text-lg text-center w-full truncate relative z-10">${player.name}</span>
                        <div class="absolute bottom-0 left-0 w-full h-1.5 bg-red-500 transform scale-x-0 group-active:scale-x-100 transition-transform origin-left duration-200"></div>
                    </button>
                `).join('');
                
                contentHtml = `<div class="w-full grid grid-cols-2 gap-3 sm:gap-4 z-10">${buttons}</div>`;
            }

            return `
            <div class="glass-panel flex flex-col items-center w-full p-6 sm:p-8 rounded-[2.5rem] border-blue-500/40 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-48 h-48 bg-red-500/10 rounded-full blur-[60px] animate-pulse-fast"></div>
                <div class="absolute bottom-0 left-0 w-48 h-48 bg-blue-500/10 rounded-full blur-[60px] animate-pulse-fast"></div>
                
                <div class="flex items-center gap-2 mb-4 z-10 bg-blue-900/40 px-5 py-2 rounded-full border border-blue-500/30 shadow-inner">
                    <i class="fa-solid fa-magnifying-glass text-lg text-blue-400 animate-pulse-fast"></i>
                    <h2 class="text-sm sm:text-base font-black text-blue-300 uppercase tracking-widest">Investigation</h2>
                </div>
                
                <h1 class="text-xl sm:text-2xl font-bold text-white mb-6 text-center z-10 leading-relaxed">
                    Police <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 font-black text-2xl sm:text-3xl block mt-1 drop-shadow-lg">${policePlayer ? policePlayer.name : ''}</span>
                    <span class="block mt-2 text-slate-400 text-sm sm:text-base font-semibold bg-slate-900/50 rounded-lg py-1 px-3 inline-block border border-slate-700">Thirudan Yaru nu Kandupidi!</span>
                </h1>

                ${contentHtml}
            </div>`;
        }

        function renderRoundScore() {
            const sortedPlayers = [...state.players].sort((a, b) => b.score - a.score);
            
            const playerRows = sortedPlayers.map((player, idx) => {
                const role = state.assignedRoles[player.id];
                const topGlow = idx === 0 ? `<div class="absolute top-0 left-0 w-1.5 h-full bg-yellow-400 shadow-[0_0_15px_rgba(250,204,21,1)]"></div>` : '';
                const bgClass = idx === 0 ? 'bg-slate-800 border-yellow-500/30' : 'bg-slate-800/60 border-slate-700/50';
                
                return `
                <div class="relative flex items-center justify-between p-3 sm:p-4 rounded-2xl border overflow-hidden ${bgClass} shadow-md">
                    ${topGlow}
                    <div class="flex items-center gap-3 sm:gap-4 z-10 pl-1">
                        <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center bg-slate-950 border border-slate-700/50 ${role.color} ${role.glow} shadow-[0_0_10px_currentColor]">
                            <i class="${role.icon} text-lg sm:text-xl"></i>
                        </div>
                        <div class="flex flex-col">
                            <p class="font-black text-white text-base sm:text-lg leading-none mb-1">${player.name}</p>
                            <p class="text-[10px] sm:text-xs text-slate-400 font-black uppercase tracking-wider">${role.name}</p>
                        </div>
                    </div>
                    <div class="text-xl sm:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-300 drop-shadow-sm z-10 pr-2">
                        ${player.score}
                    </div>
                </div>`;
            }).join('');

            const btnText = state.currentRound < state.totalRounds ? 'Next Round Polama!' : 'Show Final Results!';

            return `
            <div class="glass-panel flex flex-col items-center w-full p-6 sm:p-8 rounded-[2.5rem]">
                <div class="inline-block px-5 py-1.5 rounded-full bg-blue-500/10 border border-blue-500/30 text-blue-300 font-black text-xs sm:text-sm mb-4 uppercase tracking-widest shadow-inner">
                    End of Round ${state.currentRound}
                </div>
                <h2 class="text-3xl sm:text-4xl font-black text-white mb-2 drop-shadow-md">Scoreboard</h2>
                <p class="text-slate-400 mb-6 text-sm font-semibold tracking-wide">Yaru mass pandranga nu papom!</p>

                <div class="w-full max-h-[45vh] overflow-y-auto pr-1 space-y-3 mb-6 pb-2">
                    ${playerRows}
                </div>

                <button onclick="handleNextRound()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-base sm:text-lg shadow-[0_0_20px_rgba(37,99,235,0.4)] transition-all active:scale-95 flex justify-center items-center gap-2 mt-2">
                    ${btnText} <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>`;
        }

        function renderGameOver() {
            const sortedPlayers = [...state.players].sort((a, b) => b.score - a.score);
            const winner = sortedPlayers[0];

            const playerRows = sortedPlayers.map((player, idx) => {
                const bgClass = idx === 0 ? 'bg-gradient-to-r from-yellow-900/60 to-yellow-900/20 border border-yellow-500/50 shadow-inner' : 'bg-slate-800/80 border border-slate-700/50';
                const rankClass = idx === 0 ? 'bg-yellow-500 text-slate-900 shadow-[0_0_10px_rgba(250,204,21,0.5)]' : 'bg-slate-900 text-slate-400 border border-slate-700';
                const nameClass = idx === 0 ? 'text-yellow-400' : 'text-white';
                const scoreClass = idx === 0 ? 'text-yellow-400' : 'text-green-400';
                
                return `
                <div class="flex items-center justify-between p-3 sm:p-4 rounded-2xl ${bgClass}">
                    <div class="flex items-center gap-3 sm:gap-4">
                        <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full flex items-center justify-center font-black text-sm sm:text-base ${rankClass}">
                            #${idx + 1}
                        </div>
                        <span class="font-black text-base sm:text-lg ${nameClass}">${player.name}</span>
                    </div>
                    <span class="font-black text-xl sm:text-2xl ${scoreClass}">${player.score}</span>
                </div>`;
            }).join('');

            return `
            <div class="glass-panel flex flex-col items-center w-full p-6 sm:p-10 rounded-[2.5rem] border-yellow-500/40 text-center relative overflow-hidden transition-all duration-700 shadow-[0_0_50px_rgba(234,179,8,0.15)]">
                <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-yellow-900/30 via-transparent to-transparent"></div>
                
                <div class="relative mb-6 z-10 mt-2">
                    <div class="absolute inset-0 bg-yellow-500/30 blur-2xl rounded-full"></div>
                    <i class="fa-solid fa-trophy text-[5rem] sm:text-[6rem] text-yellow-400 relative z-10 animate-custom-bounce drop-shadow-[0_0_20px_rgba(250,204,21,0.8)]"></i>
                </div>
                
                <h1 class="text-4xl sm:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-200 to-yellow-600 mb-4 drop-shadow-lg z-10 tracking-tight">
                    GAME OVER!
                </h1>
                
                <div class="bg-slate-950/80 px-6 sm:px-8 py-3 rounded-2xl border border-yellow-500/30 mb-8 z-10 shadow-inner inline-block">
                    <p class="text-slate-400 font-bold mb-1 uppercase tracking-widest text-[10px] sm:text-xs">Winner</p>
                    <h2 class="text-2xl sm:text-3xl font-black text-white">
                        <span class="text-yellow-400 drop-shadow-[0_0_10px_rgba(250,204,21,0.5)]">${winner.name}</span>
                    </h2>
                </div>

                <div class="w-full max-h-[40vh] overflow-y-auto pr-1 space-y-2.5 mb-8 text-left z-10 pb-2">
                    ${playerRows}
                </div>

                <button onclick="resetGame()" class="w-full py-4 bg-gradient-to-r from-purple-600 to-blue-600 text-white rounded-2xl font-black text-base sm:text-lg flex items-center justify-center gap-3 shadow-[0_0_25px_rgba(147,51,234,0.4)] transition-all active:scale-95 z-10">
                    <i class="fa-solid fa-rotate-left"></i> THIRUMBA AADALAM!
                </button>
            </div>`;
        }

        // --- MAIN RENDER ENGINE ---
        function render() {
            const app = document.getElementById('app');
            const topBar = document.getElementById('top-bar');
            const roundIndicator = document.getElementById('round-indicator');

            // Manage Top Bar
            if (state.gameState !== 'LANDING' && state.gameState !== 'SETUP') {
                topBar.classList.remove('hidden');
                roundIndicator.innerText = `R ${state.currentRound}/${state.totalRounds}`;
            } else {
                topBar.classList.add('hidden');
            }

            // Render Views
            let content = '';
            switch (state.gameState) {
                case 'LANDING': content = renderLanding(); break;
                case 'SETUP': content = renderSetup(); break;
                case 'PASS': content = renderPassPhone(); break;
                case 'COUNTDOWN': content = renderCountdown(); break;
                case 'REVEAL': content = renderReveal(); break;
                case 'GUESS': content = renderPoliceGuess(); break;
                case 'ROUND_END': content = renderRoundScore(); break;
                case 'GAME_OVER': content = renderGameOver(); break;
            }

            app.innerHTML = content;
        }

        // Initial Load
        render();
    </script>
</body>
</html>
